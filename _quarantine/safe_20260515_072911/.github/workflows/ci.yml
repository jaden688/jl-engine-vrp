name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mcp-server:
    name: MCP server smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install MCP deps
        run: |
          python -m pip install --upgrade pip
          pip install -r mcp_server/requirements.txt
      - name: Syntax check
        run: python -m py_compile mcp_server/server.py mcp_server/http_server.py mcp_server/smoke_test.py
      - name: Smoke test (DB tools)
        run: python mcp_server/smoke_test.py

  web:
    name: Next.js build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci || npm install
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        run: npm run build

  julia:
    name: Julia tests
    runs-on: ubuntu-latest
    continue-on-error: true   # TODO: drop once test suite is green on CI
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
