services:
  sparkbyte:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: jaden688/jl-engine:latest
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SPARKBYTE_PUBLIC_PORT:-8081}:8081"
      - "${A2A_PUBLIC_PORT:-8082}:8082"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      SPARKBYTE_HOST: 0.0.0.0
      SPARKBYTE_PORT: 8081
      SPARKBYTE_LAUNCH_BROWSER: "0"
      SPARKBYTE_SKIP_PKG_INSTANTIATE: "1"
      SPARKBYTE_STATE_DIR: /app/runtime
      A2A_HOST: 0.0.0.0
      A2A_PORT: 8082
      A2A_PUBLIC_URL: ${A2A_PUBLIC_URL:-http://localhost:8082}
      A2A_API_KEY: ${A2A_API_KEY:-}
      JULIAN_AUTONOMOUS_SECONDS: ${JULIAN_AUTONOMOUS_SECONDS:-3600}
    volumes:
      - sparkbyte-state:/app/runtime
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health', timeout=7).read()"]
      interval: 30s
      timeout: 8s
      start_period: 40s
      retries: 5

  mcp:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    image: jaden688/sparkbyte-mcp:latest
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${MCP_PUBLIC_PORT:-8083}:8083"
    environment:
      MCP_TRANSPORT: ${MCP_TRANSPORT:-sse}
      MCP_PORT: 8083
      MCP_BIND: 0.0.0.0
      MCP_BIND_ACK: ${MCP_BIND_ACK:-}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      SPARKBYTE_WS: ws://sparkbyte:8081
      MCP_ALLOW_REMOTE_WS: "1"
      MCP_WS_CONCURRENCY: ${MCP_WS_CONCURRENCY:-4}
      MCP_MAX_RESPONSE_BYTES: ${MCP_MAX_RESPONSE_BYTES:-60000}
    depends_on:
      sparkbyte:
        condition: service_healthy
    init: true
    restart: unless-stopped

volumes:
  sparkbyte-state:
